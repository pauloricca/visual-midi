<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>visual-midi</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <script>
      const syncAppHeight = () => {
        document.documentElement.style.setProperty("--app-height", `${window.innerHeight}px`);
      };
      syncAppHeight();
      window.addEventListener("resize", syncAppHeight);
      window.addEventListener("orientationchange", syncAppHeight);

      let lastTouchEnd = 0;
      document.addEventListener(
        "touchstart",
        (event) => {
          if (event.touches.length > 1) {
            event.preventDefault();
          }
        },
        { passive: false }
      );
      document.addEventListener(
        "touchmove",
        (event) => {
          if (event.scale && event.scale !== 1) {
            event.preventDefault();
          }
        },
        { passive: false }
      );
      document.addEventListener(
        "touchend",
        (event) => {
          const now = Date.now();
          if (now - lastTouchEnd < 300) {
            event.preventDefault();
          }
          lastTouchEnd = now;
        },
        { passive: false }
      );

      if (new URLSearchParams(window.location.search).has("noqr")) {
        document.documentElement.classList.add("noqr");
      }
    </script>
    <main class="app-shell">
      <header class="app-header">
        <h1 id="app-title">visual-midi</h1>
      </header>
      <section id="layout-root" class="layout-panel"></section>
      <section id="qr-panel" class="qr-panel qr-panel--hidden">
        <div class="qr-copy">
          <h2>Open On Your Phone</h2>
          <p>Scan this QR code on the same local network:</p>
          <p><a id="qr-link" href="#"></a></p>
        </div>
        <img id="qr-image" class="qr-image" alt="QR code" />
      </section>
    </main>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
