# ZOOM LiveTrak L-6 controller template.
#
# The L6 exposes mixer parameters through assignable MIDI CC numbers in
# ZOOM L6 Editor. This file uses a complete suggested CC map; either set
# the L6 Editor "MIDI CC# Mapping" page to match these control numbers, or
# edit the control values below to match your current L6 mapping.
title: ZOOM LiveTrak L-6
# output: ZOOM L6
output: IAC Driver Bus 1
inertia: 1
palette:
  level: "#d85a3a"
  pan: "#2f7f68"
  send: "#3b75b7"
  eq: "#b04772"
  switch: "#6f6a2d"
  system: "#5f6d78"
rows:
