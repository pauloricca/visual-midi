title: Mutator Demo
output: IAC Driver Bus 1
inertia: 2
palette:
  orange: "#d26a2e"
  moss: "#5f8f6b"
  clay: "#b85d45"
  slate: "#5077b5"
  teal: "#4f8f88"
rows:
  - name: root
    rows:
      - name: patch
        height: 50%
        columns:
          - rows:
              - name: Cutoff
                control: 1
                default: 64
                color: orange
                max_speed: 1
                curve: 2
              - name: Resonance
                control: 11
                default: 32
                color: clay
          - rows:
              - name: Fold
                control: 11
                default: 40
                color: slate
              - name: Fold Bias
                control: 21
                default: 80
                color: moss
      - type: sequencer
        name: Sequencer
        mode: notes
        # control: 3
        channel: 1
        size: 16
        subdivision: 1/8
        root: C4
        scale: minor
        color: plum
        show_velocity: true
        show_gate: true
        show_timing: true
      - columns:
          - type: tempo
            name: Tempo
            width: 18%
            min: 40
            max: 240
            default: 120
            color: clay
          - type: mutator
            name: Sequencer Mutator
            target: Sequencer
            default: 0.35
            note: true
            step: false
            velocity: true
            gate: true
            timing: false
            color: teal
          - type: memory
            name: Sequencer Memory
            target: Sequencer
            slots: 4
            transition: 0.5
            color: orange
