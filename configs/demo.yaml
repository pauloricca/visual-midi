output: IAC Driver Bus 1
inertia: 2
osc:
  host: 127.0.0.1
  port: 9000
palette:
  orange: "#d26a2e"
  moss: "#5f8f6b"
  clay: "#b85d45"
  slate: "#5077b5"
  sand: "#c8a76a"
  plum: "#8a5a7c"
  teal: "#4f8f88"
# palette:
#   orange: "black"
#   moss: "black"
#   clay: "black"
#   slate: "black"
#   sand: "black"
#   plum: "black"
#   teal: "black"
quantize_speed: true
rows:
  - columns:
    - rows:
        - name: Filter cutoff
          channel: 1
          control: 1
          default: 64
          color: sand
          osc:
            path: /waves/a/freq
            min: 20
            max: 20000
    - rows:
        - type: lfo
          name: Fold
          complex: true
          channel: 1
          control: 11
          color: orange
    - rows:
        - name: Fold bias
          channel: 1
          control: 21
          default: 64
          color: slate
    - tabs:
        - tab:
            name: Buttons
            rows:
              - type: button
                name: Button A
                channel: 1
                control: 31
                default: 64
                color: clay
              - type: button
                name: Button B
                channel: 1
                control: 31
                default: 64
                color: orange
              - type: button
                name: Button C
                channel: 1
                control: 31
                default: 64
                color: plum
        - tab:
            name: Sliders
            rows:
              - name: Freq E
                channel: 1
                control: 41
                default: 64
                color: plum
              - rows:
                  - name: Amp E
                    channel: 1
                    control: 42
                    default: 32
                    color: plum
                    orientation: horizontal
                  - name: LFO E
                    channel: 1
                    control: 43
                    default: 24
                    color: moss
                    orientation: horizontal
        - tab:
            name: Sliders
            rows:
              - name: Freq E
                channel: 1
                control: 41
                default: 64
                color: plum
              - rows:
                  - name: Amp E
                    channel: 1
                    control: 42
                    default: 32
                    color: plum
                    orientation: horizontal
                  - name: LFO E
                    channel: 1
                    control: 43
                    default: 24
                    color: moss
                    orientation: horizontal
  - rows:
    - name: Sequences
      type: memory
      target: sequencers
      slots: 8
      transition: 1
      height: 20%
      color: orange
    - name: sequencers
      width: 30%
      rows:
        - type: sequencer
          name: Bass Seq
          mode: notes
          # control: 3
          channel: 1
          size: 8
          subdivision: 1/8
          root: C2
          scale: minor
          color: moss
        - type: sequencer
          name: Mid Seq
          mode: notes
          # control: 3
          channel: 1
          size: 32
          subdivision: 1/8
          root: C4
          scale: minor
          color: plum
  - height: 20%
    columns:
      - type: tempo
        name: Tempo
        width: 18%
        min: 40
        max: 240
        default: 120
        color: clay
      - name: lead
        type: keyboard
        # size: 48
        start: C5
        size: 12
        root: C5
        scale: minor
