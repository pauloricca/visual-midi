      - name: Freq A
        channel: 1
        control: 1
        default: 64
        color: sand
        height: 70%
        speed: 0.2
        osc:
          path: /waves/a/freq
          min: 20
          max: 20000
      - rows:
          - name: Amp A
            channel: 1
            control: 2
            default: 32
            color: moss
            orientation: horizontal
            osc:
              path: /visual/amp/a
              min: 0
              max: 1
